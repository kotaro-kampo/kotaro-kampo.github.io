name: Update KEGG Data

on:
  schedule:
    # 毎日 日本時間 午前3:00 (UTC 18:00) に実行
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          
      - name: Install dependencies
        run: |
          cd scripts
          npm install
          
      - name: Run scraper
        run: |
          cd scripts
          node update-data.js
          
      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update data.json" && git push)
